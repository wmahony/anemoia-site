<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Anemoia</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta property="og:title" content="Shop — Anemoia">
  <meta property="og:description" content="An artist development and music rights management company.">
  <meta property="og:image" content="https://anemoia.nyc/logo.png">
  <meta property="og:url" content="https://anemoia.nyc/shop.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://anemoia.nyc/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 48px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .header-wordmark {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -0.02em;
      color: #fff;
      text-decoration: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .header-back {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.3s;
    }

    .header-back:hover { color: rgba(255,255,255,0.9); }

    /* ── Featured ── */
    .featured {
      margin-top: 73px; /* header height */
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 73px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .featured-img-wrap {
      position: relative;
      overflow: hidden;
      background: #0d0d0d;
    }

    .featured-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .featured-img-wrap:hover .featured-img { transform: scale(1.03); }

    .featured-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 72px;
      border-left: 1px solid rgba(255,255,255,0.06);
    }

    .featured-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 24px;
    }

    .featured-artist {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    .featured-name {
      font-size: clamp(22px, 2.8vw, 36px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .featured-price {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 40px;
    }

    .featured-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-primary {
      padding: 16px 32px;
      background: #fff;
      color: #000;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid #fff;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
    }

    .btn-primary:hover { background: transparent; color: #fff; }

    .btn-secondary {
      padding: 16px 32px;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s;
    }

    .btn-secondary:hover { border-color: #fff; color: #fff; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 48px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .filter-btn {
      padding: 18px 24px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
    }

    .filter-btn:hover { color: rgba(255,255,255,0.7); }
    .filter-btn.active { color: #fff; border-bottom-color: #fff; }

    /* ── Product grid ── */
    .grid-section {
      padding: 48px 48px 120px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .product-card {
      position: relative;
      background: #0a0a0a;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    .status-dot {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      z-index: 2;
    }

    .status-dot.in-stock { background: #3ddc84; }
    .status-dot.sold-out { background: #ff4444; }

    .product-img-wrap {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #111;
      position: relative;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .product-card:hover .product-img { transform: scale(1.04); }

    .product-card-btn {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 16px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.1);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
    }

    .product-card:hover .product-card-btn {
      opacity: 1;
      transform: translateY(0);
    }

    .product-info {
      padding: 16px 20px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .product-meta { display: none; }

    .product-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.4;
      color: #fff;
    }

    .product-price {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
      white-space: nowrap;
    }

    .grid-loading, .grid-error {
      grid-column: 1 / -1;
      padding: 60px 0;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      text-align: center;
    }

    .grid-error a { color: rgba(255,255,255,0.5); }

    /* ── Footer ── */
    footer {
      padding: 40px 48px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .f-logo {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: -0.01em;
      color: rgba(255,255,255,0.25);
    }

    .f-copy {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .featured { grid-template-columns: 1fr; min-height: auto; }
      .featured-img-wrap { aspect-ratio: 4/3; }
      .featured-info { padding: 48px 32px; border-left: none; border-top: 1px solid rgba(255,255,255,0.06); }
      .product-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      header { padding: 20px 24px; }
      .filter-bar { padding: 0 24px; overflow-x: auto; }
      .grid-section { padding: 32px 24px 80px; }
      .product-grid { grid-template-columns: 1fr; }
      footer { padding: 32px 24px; flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

  <header>
    <a class="header-wordmark" href="index.html">anemoia</a>
    <div class="header-right">
      <a class="header-back" href="index.html">← Back</a>
    </div>
  </header>

  <!-- Featured product -->
  <section class="featured">
    <div class="featured-img-wrap">
      <img class="featured-img"
        src="https://anemoia-shop.myshopify.com/cdn/shop/files/unisex-eco-raglan-hoodie-black-front-69dbe057d464b.jpg?v=1776017511"
        alt="Anemoia Eco Raglan Hoodie">
    </div>
    <div class="featured-info">
      <div class="featured-label">Featured</div>
      <div class="featured-artist">Anemoia</div>
      <h1 class="featured-name">Eco Raglan Hoodie</h1>
      <div class="featured-price">$65</div>
      <div class="featured-actions">
        <a class="btn-primary" href="https://anemoia-shop.myshopify.com/products/anemoia-logo-unisex-eco-raglan-hoodie" target="_blank" rel="noopener">+ Add to Cart</a>
        <a class="btn-secondary" href="https://anemoia-shop.myshopify.com/products/anemoia-logo-unisex-eco-raglan-hoodie" target="_blank" rel="noopener">View Details</a>
      </div>
    </div>
  </section>

  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter(this, 'all')">All</button>
    <button class="filter-btn" onclick="setFilter(this, 'music')">Music</button>
    <button class="filter-btn" onclick="setFilter(this, 'merch')">Merch</button>
    <button class="filter-btn" onclick="setFilter(this, 'bundles')">Bundles</button>
  </div>

  <!-- Product grid — populated from Shopify products.json -->
  <div class="grid-section">
    <div class="product-grid" id="productGrid">
      <div class="grid-loading">Loading...</div>
    </div>
  </div>

  <footer>
    <div class="f-logo">anemoia</div>
    <div class="f-copy">© 2026 Anemoia — All Rights Reserved</div>
  </footer>

  <script>
    const SHOP_URL = 'https://anemoia-shop.myshopify.com';

    function getCategory(product) {
      const type = (product.product_type || '').toLowerCase();
      const tags = (product.tags || []).map(t => t.toLowerCase());
      if (tags.includes('bundle')) return 'bundles';
      if (type.includes('music') || tags.includes('music') || tags.includes('vinyl') || tags.includes('cd') || tags.includes('album')) return 'music';
      return 'merch';
    }

    function setFilter(btn, category) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.product-card').forEach(card => {
        const show = category === 'all' || card.dataset.category === category;
        card.style.display = show ? 'flex' : 'none';
      });
    }

    async function loadProducts() {
      const grid = document.getElementById('productGrid');
      try {
        const res = await fetch(`${SHOP_URL}/products.json`);
        if (!res.ok) throw new Error('Network error');
        const { products } = await res.json();

        grid.innerHTML = products.map(p => {
          const available = p.variants.some(v => v.available);
          const price = parseFloat(p.variants[0].price);
          const priceStr = price % 1 === 0 ? `$${price.toFixed(0)}` : `$${price.toFixed(2)}`;
          const img = p.images[0]?.src || '';
          const category = getCategory(p);
          const url = `${SHOP_URL}/products/${p.handle}`;

          return `
            <a class="product-card" data-category="${category}" href="${url}" target="_blank" rel="noopener">
              <span class="status-dot ${available ? 'in-stock' : 'sold-out'}"></span>
              <div class="product-img-wrap">
                ${img ? `<img class="product-img" src="${img}" alt="${p.title}" loading="lazy">` : ''}
                <div class="product-card-btn">${available ? '+ Add to Cart' : 'Sold Out'}</div>
              </div>
              <div class="product-info">
                <div class="product-name">${p.title}</div>
                <div class="product-price">${priceStr}</div>
              </div>
            </a>
          `;
        }).join('');

        // Re-apply active filter after render
        const activeBtn = document.querySelector('.filter-btn.active');
        if (activeBtn) setFilter(activeBtn, activeBtn.dataset.filter || 'all');

      } catch (e) {
        grid.innerHTML = '<p class="grid-error">Unable to load products. Visit <a href="' + SHOP_URL + '" target="_blank">our store</a> directly.</p>';
      }
    }

    loadProducts();
  </script>

</body>
</html>
