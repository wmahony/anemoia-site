    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 48px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .header-wordmark {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -0.02em;
      color: #fff;
      text-decoration: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .header-back {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.3s;
    }

    .header-back:hover { color: rgba(255,255,255,0.9); }

    /* ── Featured ── */
    .featured {
      margin-top: 73px; /* header height */
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 73px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .featured-img-wrap {
      position: relative;
      overflow: hidden;
      background: #0d0d0d;
    }

    .featured-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .featured-img-wrap:hover .featured-img { transform: scale(1.03); }

    .featured-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 72px;
      border-left: 1px solid rgba(255,255,255,0.06);
    }

    .featured-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 24px;
    }

    .featured-artist {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    .featured-name {
      font-size: clamp(22px, 2.8vw, 36px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .featured-price {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 40px;
    }

    .featured-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-primary {
      padding: 16px 32px;
      background: #fff;
      color: #000;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid #fff;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
    }

    .btn-primary:hover { background: transparent; color: #fff; }

    .btn-secondary {
      padding: 16px 32px;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s;
    }

    .btn-secondary:hover { border-color: #fff; color: #fff; }

      align-items: center;
      gap: 0;
      padding: 0 48px;
      border-bottom: 1px solid rgba(255,255,255,0.06);

      font-weight: 500;

      text-transform: uppercase;
      color: rgba(255,255,255,0.35);

      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;

      .featured-info { padding: 48px 32px; border-left: none; border-top: 1px solid rgba(255,255,255,0.06); }
