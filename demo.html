<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Submit a Demo — Anemoia</title>
  <meta name="description" content="Submit a demo to Anemoia. We accept MP3, WAV, or streaming links.">
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 58px;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nav-wordmark {
      font-family: 'Archivo Black', sans-serif;
      font-size: 13px;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.88);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    nav a {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.3s;
    }

    nav a:hover { color: rgba(255,255,255,0.75); }

    /* ── Page ── */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 120px 40px 100px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      margin-bottom: 56px;
      transition: color 0.25s;
    }

    .back-link:hover { color: rgba(255,255,255,0.65); }
    .back-link::before { content: '←'; font-size: 13px; }

    h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(38px, 5vw, 64px);
      letter-spacing: -0.02em;
      line-height: 1.0;
      margin-bottom: 16px;
    }

    .sub {
      font-size: 14px;
      font-weight: 300;
      color: rgba(255,255,255,0.4);
      margin-bottom: 52px;
    }

    .form-wrap {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      overflow: hidden;
    }

    @media (max-width: 768px) {
      nav { padding: 0 24px; }
      .nav-links { gap: 20px; }
      .page { padding: 100px 24px 80px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-wordmark">anemoia</a>
    <div class="nav-links">
      <a href="/#about">About</a>
      <a href="/#artists">Artists</a>
      <a href="/#news">News</a>
      <a href="/shop.html">Shop</a>
    </div>
  </nav>

  <main class="page">
    <a href="/" class="back-link">Back to anemoia</a>

    <h1>Submit a Demo</h1>
    <p class="sub">MP3, WAV, or streaming link</p>

    <div class="form-wrap">
      <iframe
        data-tally-src="https://tally.so/embed/LZMYYz?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
        loading="lazy"
        width="100%"
        height="500"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        title="Submit a Demo">
      </iframe>
    </div>
  </main>

  <script>
    var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}
  </script>

</body>
</html>
